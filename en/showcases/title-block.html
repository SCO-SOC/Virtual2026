<header id="title-block-header" class="quarto-title-block default">

    <div class="quarto-title">
        <h2 class="title">$title$</h2>
    </div>

    <div class="quarto-title-meta">
        <div>
            <div class="quarto-title-meta-heading">Presenter(s)</div>
            <div class="quarto-title-meta-contents">
                $for(author)$
                <p>$author$</p>
                $endfor$
            </div>
        </div>

        <div>
            <div class="quarto-title-meta-heading">Affiliation(s)</div>
            <div class="quarto-title-meta-contents">
                $for(author-affiliation)$
                <p>$author-affiliation$</p>
                $endfor$
            </div>
        </div>

        <div>
            <div class="quarto-title-meta-heading">Date</div>
            <div class="quarto-title-meta-contents">
                <p>$date$</p>
            </div>
        </div>


        <div>
            <div class="quarto-title-meta-heading">Organization Type</div>
            <div class="quarto-title-meta-contents">
                <p>$type$</p>
            </div>
        </div>

    </div>

</header>
